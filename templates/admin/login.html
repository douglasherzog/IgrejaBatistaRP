<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo – IBNV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Lato', sans-serif; }</style>
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="text-center mb-8">
        <img src="/static/img/logo.png" alt="Logo" class="h-16 w-16 object-contain mx-auto mb-3" onerror="this.style.display='none'">
        <h1 class="text-2xl font-bold text-blue-900" style="font-family:'Playfair Display',serif">Área Administrativa</h1>
        <p class="text-gray-500 text-sm mt-1">Igreja Batista Nova Vida</p>
    </div>

    {% if request.query_params.get('setup') == 'ok' %}
    <div class="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg p-3 mb-4">
        Autenticador configurado com sucesso! Faça login.
    </div>
    {% endif %}

    {% if erro %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">
        {{ erro }}
    </div>
    {% endif %}

    <form method="post" action="/admin/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input type="email" name="email" required autofocus
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
            <input type="password" name="senha" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
            class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-800 transition font-medium text-sm mt-2">
            Entrar
        </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-6">Acesso restrito a administradores</p>
</div>
</body>
</html>
