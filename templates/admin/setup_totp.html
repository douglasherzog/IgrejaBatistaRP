<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Autenticador – IBNV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Lato', sans-serif; }</style>
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-6">
        <div class="text-4xl mb-3">📱</div>
        <h1 class="text-2xl font-bold text-blue-900">Configurar Google Authenticator</h1>
        <p class="text-gray-500 text-sm mt-2">Escaneie o QR Code abaixo com o aplicativo Google Authenticator (ou Authy) e confirme com o código gerado.</p>
    </div>

    {% if erro %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-4">
        {{ erro }}
    </div>
    {% endif %}

    <div class="flex justify-center mb-6">
        <img src="data:image/png;base64,{{ qrcode }}" alt="QR Code" class="w-48 h-48 border rounded-lg shadow">
    </div>

    <form method="post" action="/admin/setup-totp" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Código de confirmação</label>
            <input type="text" name="codigo" maxlength="6" pattern="\d{6}" required autofocus
                placeholder="000000"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
            class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-blue-800 transition font-medium text-sm">
            Confirmar e ativar
        </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-4">Após confirmar, você usará o código do aplicativo a cada login.</p>
</div>
</body>
</html>
